<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>MovieList</title>
</head>
<header>
    <h1>Movie List</h1>
    <ul>
        <li>
            <a th:href="@{/}">Start</a>
        </li>
    </ul>
</header>
<body>
    <p>Här kommer en lista med filmer att visas</p>
    <div class="movieList" th:unless="${#lists.isEmpty(allMovies)}">
        <ul th:each="movie : ${allMovies}">
            <li><a th:text="${movie.title}" th:href="@{/movieList/movieInfo/{id}(id=${movie.id})}"></a></li>
        </ul>
    </div>
    <ul>
        <li>
            <a th:href="@{/movieList/addMovie}">add a movie</a>
        </li>
    </ul>

</body>
</html>
